<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e17;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    padding: 20px;
  }

  .window {
    width: 100%;
    max-width: 780px;

    border-radius: 12px;

    box-shadow: 0 0 40px rgba(0,212,255,0.08), 0 0 80px rgba(124,58,237,0.05);

  .titlebar {
    background: #161b22;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #21262d;
    user-select: none;
  }

  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green { background: #28c840; }

  .titlebar span {
    flex: 1;
    text-align: center;
    color: #484f58;
    font-size: 13px;
  }

  .terminal {
    padding: 20px;
    height: 520px;
    overflow-y: auto;
    color: #c9d1d9;
    font-size: 14px;
    line-height: 1.7;
  }

  .terminal::-webkit-scrollbar { width: 6px; }
  .terminal::-webkit-scrollbar-track { background: transparent; }
  .terminal::-webkit-scrollbar-thumb { background: #21262d; border-radius: 3px; }

  .output-line { white-space: pre-wrap; word-wrap: break-word; }

  .prompt-color { color: #7c3aed; font-weight: 700; }
  .path-color { color: #00d4ff; }
  .cmd-color { color: #c9d1d9; }
  .key { color: #00d4ff; }
  .val { color: #c9d1d9; }
  .accent { color: #7c3aed; }
  .green { color: #3fb950; }
  .yellow { color: #d29922; }
  .dim { color: #484f58; }
  .bold { font-weight: 700; }
  .link { color: #58a6ff; text-decoration: none; }
  .link:hover { text-decoration: underline; }

  .input-row {
    display: flex;
    align-items: center;
    margin-top: 2px;
  }

  .input-row input {
    background: none;
    border: none;
    outline: none;
    color: #c9d1d9;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    flex: 1;
    caret-color: #00d4ff;
  }

  .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: #00d4ff;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 780px;
    width: 100%;
    margin-bottom: 12px;
    padding: 0 4px;

    color: #58a6ff;
    text-decoration: none;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;

    background: #161b22;
    color: #c9d1d9;
    border: 1px solid #21262d;
    border-radius: 6px;

const ALIASES = {
  about: 'whoami',
  me: 'whoami',
  tech: 'skills',
  stack: 'skills',
  repos: 'projects',
  work: 'experience',
  job: 'experience',
  social: 'contact',
  links: 'contact',
  fact: 'funfact',
  ls: 'help',
};

const output = document.getElementById('output');
const cmdInput = document.getElementById('cmdInput');
const terminal = document.getElementById('terminal');
const inputRow = document.getElementById('inputRow');
const history = [];
let historyIndex = -1;

function prompt() {
  return '<span class="prompt-color">vijay</span><span class="dim">@</span><span class="path-color">bangalore</span><span class="dim">:~$ </span>';
}

function addLine(html) {
  const div = document.createElement('div');
  div.className = 'output-line';
  div.innerHTML = html;
  output.appendChild(div);
}

function scrollBottom() {
  terminal.scrollTop = terminal.scrollHeight;
}

function printWelcome() {
  const lines = [
    '',
    '<span class="accent bold">  Welcome to Vijay Gupta\'s Terminal Portfolio</span>',
    '<span class="dim">  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>',
    '',
    '  Type <span class="key">help</span> to see available commands.',
    '  Navigate my profile like a real terminal.',
    '',
  ];
  lines.forEach(l => addLine(l));
}

function runCommand(cmd) {
  const trimmed = cmd.trim().toLowerCase();

  addLine(prompt() + '<span class="cmd-color">' + escapeHtml(cmd) + '</span>');

  if (!trimmed) { scrollBottom(); return; }

  const resolved = ALIASES[trimmed] || trimmed;
  const handler = COMMANDS[resolved];

  if (!handler) {
    addLine(`<span class="dim">  command not found: ${escapeHtml(trimmed)}. Type </span><span class="key">help</span><span class="dim"> to see available commands.</span>`);
    addLine('');
  } else {
    const result = handler();
    if (result === 'CLEAR') {
      output.innerHTML = '';
    } else {
      result.forEach(line => addLine(line));
    }
  }

  scrollBottom();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

printWelcome();
scrollBottom();
cmdInput.focus();

cmdInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const cmd = cmdInput.value;
    if (cmd.trim()) { history.unshift(cmd); historyIndex = -1; }
    runCommand(cmd);
    cmdInput.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      cmdInput.value = history[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      cmdInput.value = history[historyIndex];
    } else {
      historyIndex = -1;
      cmdInput.value = '';
    }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    output.innerHTML = '';
  }
});

terminal.addEventListener('click', () => cmdInput.focus());

// Version switcher

}
